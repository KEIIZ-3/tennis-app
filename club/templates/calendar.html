{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
  :root { --page-max-width: 1100px; }

  .cal-page { max-width: 1100px; margin: 0 auto; padding: 12px; }
  .cal-toolbar { display:flex; justify-content:space-between; align-items:flex-end; gap:12px; flex-wrap:wrap; }
  .cal-title h2 { margin:0; font-size: 22px; }
  .cal-hint { color:#666; font-size:12px; margin-top:4px; }

  .cal-legend { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .badge2 { display:inline-flex; align-items:center; gap:6px; font-size:12px; padding:4px 10px; border-radius:999px; border:1px solid #eee; background:#fff; color:#333; }
  .dot { width:10px; height:10px; border-radius:999px; display:inline-block; }
  .dot-full { background:#e74c3c; }
  .dot-resv { background:#3498db; }

  .cal-controls { display:flex; align-items:center; gap:8px; }
  .cal-label { font-size: 12px; color:#444; }
  .cal-select { padding:8px 10px; border:1px solid #ddd; border-radius:10px; }
  .cal-btn { padding:8px 10px; border:1px solid #111; background:#111; color:#fff; border-radius:10px; cursor:pointer; }

  .cal-box { margin-top: 12px; background:#fff; border:1px solid #eee; border-radius:14px; padding: 8px; }
  @media (max-width: 720px) { .cal-box { padding: 4px; } }

  @media (max-width: 720px) {
    .fc .fc-toolbar-title { font-size: 16px; }
    .fc .fc-button { padding: 6px 8px; }
  }

  .fc .fc-daygrid-event-dot { display:none !important; }
  .fc .fc-daygrid-event { display:block !important; }
  .fc .fc-daygrid-event-harness { margin-top: 2px; margin-bottom: 2px; }
  .fc .fc-daygrid-event, .fc .fc-timegrid-event { border-radius: 8px; overflow: hidden; }
  .fc .fc-daygrid-event .fc-event-main, .fc .fc-timegrid-event .fc-event-main { padding: 2px 6px; }
  .fc .fc-daygrid-event .fc-event-title, .fc .fc-daygrid-event .fc-event-time,
  .fc .fc-timegrid-event .fc-event-title, .fc .fc-timegrid-event .fc-event-time { font-size: 11px; line-height: 1.2; }

  /* -------------------
     ✅ モーダル（重なりフリーズ対策）
     - z-indexを強制的に最前面へ
     - 背面クリック/スクロールを止める
  ------------------- */
  body.modal-open { overflow: hidden; touch-action: none; }

  .modal {
    position: fixed;
    inset: 0;
    display:none;
    align-items: center;
    justify-content: center;
    padding: 14px;
    z-index: 9999;            /* ★最重要 */
  }
  .modal.show { display:flex; }

  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.45);
  }

  .modal-card {
    position: relative;
    width: 100%;
    max-width: 520px;
    background:#fff;
    border-radius: 14px;
    border:1px solid #eee;
    box-shadow: 0 10px 30px rgba(0,0,0,.15);
    overflow:hidden;
    z-index: 10000;           /* ★最重要 */
  }

  .modal-head { padding: 12px 14px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; gap:10px; align-items:center; }
  .modal-title { margin:0; font-size: 16px; }
  .modal-body { padding: 12px 14px; }
  .modal-row { margin: 8px 0; }
  .muted { color:#666; font-size:12px; }
  .modal-foot { padding: 12px 14px; border-top:1px solid #eee; display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; }

  .btn { border:1px solid #111; background:#111; color:#fff; padding:8px 10px; border-radius:10px; cursor:pointer; font-size: 13px; }
  .btn.outline { background:#fff; color:#111; }
  .btn.danger { background:#e74c3c; border-color:#e74c3c; }
  .pill { display:inline-flex; align-items:center; gap:6px; font-size:12px; padding:4px 10px; border-radius:999px; border:1px solid #eee; background:#fff; color:#333; }
</style>

<div class="cal-page">
  <div class="cal-toolbar">
    <div class="cal-title">
      <h2>カレンダー</h2>
      <div class="cal-hint">枠をクリックすると詳細が出ます（空きなら予約作成へ）</div>

      <div class="cal-legend">
        <span class="badge2"><span class="dot" id="dotCoach" style="background:#2ecc71;"></span>空き（コーチ色）</span>
        <span class="badge2"><span class="dot dot-full"></span>満員</span>
        <span class="badge2"><span class="dot dot-resv"></span>予約</span>
      </div>
    </div>

    <form method="get" class="cal-controls">
      <label class="cal-label">コーチ</label>
      <select name="coach" class="cal-select" onchange="this.form.submit()">
        {% for c in coaches %}
          <option value="{{ c.id }}" {% if selected_coach_id == c.id|stringformat:"s" %}selected{% endif %}>
            {{ c.username }}
          </option>
        {% endfor %}
      </select>
      <noscript><button type="submit" class="cal-btn">表示</button></noscript>
    </form>
  </div>

  <div class="muted" style="margin-top:6px;">自動更新：15秒 / タブ復帰で更新</div>
  <div id="calendar" class="cal-box"></div>
</div>

<div id="modal" class="modal" aria-hidden="true">
  <div class="modal-backdrop" id="modalBg"></div>
  <div class="modal-card" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h3 class="modal-title" id="mTitle">詳細</h3>
      <button class="btn outline" id="mClose" type="button">閉じる</button>
    </div>
    <div class="modal-body">
      <div class="modal-row">
        <span class="pill"><span class="dot" id="mCoachDot" style="background:#2ecc71;"></span><span id="mCoachName">coach</span></span>
      </div>
      <div class="modal-row muted" id="mTime"></div>
      <div class="modal-row" id="mLine1"></div>
      <div class="modal-row" id="mLine2"></div>
      <div class="modal-row muted" id="mWarn" style="display:none;"></div>
    </div>
    <div class="modal-foot">
      <button class="btn outline" id="mDismiss" type="button">閉じる</button>
      <a class="btn" id="mReserveBtn" href="#" style="display:none;">予約作成へ</a>

      <form id="mCancelForm" method="post" action="#" style="display:none;">
        {% csrf_token %}
        <input type="hidden" name="next" value="/calendar/?coach={{ selected_coach_id }}">
        <button class="btn danger" type="submit">予約キャンセル</button>
      </form>
    </div>
  </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const calendarEl = document.getElementById("calendar");
  const coachId = "{{ selected_coach_id|default:'' }}";
  const isMobile = window.matchMedia && window.matchMedia("(max-width: 720px)").matches;

  if (!coachId) {
    calendarEl.innerHTML = "<div style='padding:12px;color:#666'>コーチが選択されていません</div>";
    return;
  }

  const pad2 = (n) => String(n).padStart(2, "0");
  const fmtHM = (d) => `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
  const fmtYMD = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;

  const modal = document.getElementById("modal");
  const mTitle = document.getElementById("mTitle");
  const mCoachDot = document.getElementById("mCoachDot");
  const mCoachName = document.getElementById("mCoachName");
  const mTime = document.getElementById("mTime");
  const mLine1 = document.getElementById("mLine1");
  const mLine2 = document.getElementById("mLine2");
  const mWarn = document.getElementById("mWarn");
  const mReserveBtn = document.getElementById("mReserveBtn");
  const mCancelForm = document.getElementById("mCancelForm");

  function openModal() {
    modal.classList.add("show");
    document.body.classList.add("modal-open");
  }
  function closeModal() {
    modal.classList.remove("show");
    document.body.classList.remove("modal-open");
  }

  document.getElementById("mClose").addEventListener("click", closeModal);
  document.getElementById("mDismiss").addEventListener("click", closeModal);
  document.getElementById("modalBg").addEventListener("click", closeModal);

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && modal.classList.contains("show")) closeModal();
  });

  async function openDetail(ev) {
    const p = ev.extendedProps || {};
    const kind = p.kind;

    const params = new URLSearchParams({ kind, coach_id: coachId });

    if (kind === "reservation") {
      params.set("reservation_id", p.reservation_id);
    } else {
      params.set("date", p.date || fmtYMD(ev.start));
      params.set("start_time", p.start_time || fmtHM(ev.start));
      params.set("end_time", p.end_time || fmtHM(ev.end));
    }

    const res = await fetch("{% url 'club:calendar_event_detail_api' %}?" + params.toString(), { credentials: "same-origin" });
    const data = await res.json();

    mTitle.textContent = data.title || "詳細";
    mCoachName.textContent = data.coachName || "";
    mCoachDot.style.background = data.coachColor || "#2ecc71";
    document.getElementById("dotCoach").style.background = data.coachColor || "#2ecc71";

    mWarn.style.display = "none";
    mWarn.textContent = "";

    mReserveBtn.style.display = "none";
    mReserveBtn.href = "#";

    mCancelForm.style.display = "none";
    mCancelForm.action = "#";

    if (data.kind === "reservation") {
      mTime.textContent = `${data.start} - ${data.end.split(" ").pop()}`;

      if (data.court && data.customer) {
        mLine1.innerHTML = `<b>コート：</b>${data.court}`;
        mLine2.innerHTML = `<b>予約者：</b>${data.customer}`;
      } else {
        mLine1.innerHTML = "予約があります";
        mLine2.innerHTML = "";
      }

      if (data.can_cancel && data.cancel_url) {
        mCancelForm.style.display = "inline-block";
        mCancelForm.action = data.cancel_url;
      }
    } else {
      mTime.textContent = `${data.date} ${data.start_time}-${data.end_time}`;
      mLine1.innerHTML = `<b>定員：</b>${data.booked} / ${data.capacity}`;
      mLine2.innerHTML = `<b>残り：</b>${data.remaining}`;

      if (data.remaining > 0 && data.reservation_url) {
        mReserveBtn.style.display = "inline-block";
        mReserveBtn.href = data.reservation_url;
      } else {
        mWarn.style.display = "block";
        mWarn.textContent = "満員のため予約できません。";
      }
    }

    openModal();
  }

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: isMobile ? "timeGridWeek" : "dayGridMonth",
    locale: "ja",
    firstDay: 1,
    height: isMobile ? "auto" : 720,
    headerToolbar: { left: "prev,next today", center: "title", right: "dayGridMonth,timeGridWeek" },
    buttonText: { today: "今日", month: "月", week: "週" },
    navLinks: true,
    nowIndicator: true,
    eventDisplay: "block",

    eventContent: function(arg) {
      const ev = arg.event;
      const p = ev.extendedProps || {};
      const title = (ev.title || "").trim();
      const start = ev.start;
      const end = ev.end;

      let prefix = "";
      if (start && end && (p.kind === "availability" || p.kind === "full")) {
        prefix = `${fmtHM(start)}-${fmtHM(end)} `;
      } else if (arg.timeText) {
        prefix = arg.timeText ? (arg.timeText + " ") : "";
      }

      const wrap = document.createElement("div");
      wrap.style.whiteSpace = "normal";
      const t = document.createElement("span");
      t.textContent = prefix + title;
      wrap.appendChild(t);
      return { domNodes: [wrap] };
    },

    events: function(fetchInfo, successCallback, failureCallback) {
      const params = new URLSearchParams({ coach_id: coachId, start: fetchInfo.startStr, end: fetchInfo.endStr });
      fetch("{% url 'club:calendar_events_api' %}?" + params.toString(), { credentials: "same-origin" })
        .then(r => r.json())
        .then(data => successCallback(data))
        .catch(err => failureCallback(err));
    },

    eventClick: async function(info) {
      info.jsEvent.preventDefault();
      try { await openDetail(info.event); } catch (e) { console.error(e); }
    }
  });

  calendar.render();

  // ③ 自動更新（15秒）＋タブ復帰
  setInterval(() => calendar.refetchEvents(), 15000);
  document.addEventListener("visibilitychange", () => { if (!document.hidden) calendar.refetchEvents(); });
});
</script>
{% endblock %}
