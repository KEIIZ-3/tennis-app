{% extends "base.html" %}
{% block title %}ログイン{% endblock %}

{% block content %}
<div class="card">
  <h2>ログイン</h2>

  <form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}

    <div>
      <label>ユーザー名</label>
      {{ form.username }}
      {{ form.username.errors }}
    </div>

    <div>
      <label>パスワード</label>
      {{ form.password }}
      {{ form.password.errors }}
    </div>

    <div style="margin-top:16px;">
      <button type="submit">ログイン</button>
    </div>
  </form>
</div>
{% endblock %}
