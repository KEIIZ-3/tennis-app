<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LINEログイン</title>
  <style>
    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background:#f6f8fb;
      color:#111827;
      line-height:1.6;
    }

    .liff-card{
      width:100%;
      max-width:480px;
      border:1px solid #e5e7eb;
      background:#fff;
      border-radius:20px;
      padding:22px;
      box-shadow:0 12px 30px rgba(15, 23, 42, 0.08);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
    }

    .brand-mark{
      width:42px;
      height:42px;
      border-radius:14px;
      background:#0f172a;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
    }

    h1{
      margin:0;
      font-size:24px;
      line-height:1.25;
      font-weight:900;
      letter-spacing:-0.02em;
    }

    .lead{
      margin:10px 0 0;
      color:#6b7280;
      font-size:14px;
      line-height:1.8;
    }

    .status{
      margin-top:18px;
      padding:14px;
      border:1px solid #bfdbfe;
      background:#eff6ff;
      border-radius:14px;
      color:#1d4ed8;
      font-size:14px;
      line-height:1.8;
    }

    .error{
      border-color:#fecaca;
      background:#fff5f5;
      color:#991b1b;
    }

    .success{
      border-color:#bbf7d0;
      background:#ecfdf5;
      color:#166534;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:18px;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      border-radius:14px;
      border:1px solid #d1d5db;
      background:#fff;
      color:#111827;
      text-decoration:none;
      font-weight:900;
      cursor:pointer;
      font:inherit;
    }

    .btn-primary{
      background:#06c755;
      color:#fff;
      border-color:#06c755;
    }
  </style>
</head>
<body>
  <main class="liff-card">
    <div class="brand">
      <div class="brand-mark">T</div>
      <div>
        <h1>LINEログイン</h1>
        <div class="lead">Play Design Tennis に接続しています。</div>
      </div>
    </div>

    <div id="status" class="status">
      LINEアプリ内で認証を確認しています。しばらくお待ちください。
    </div>

    <div class="actions">
      <button type="button" class="btn btn-primary" id="retry-button">再試行</button>
      <a href="{{ home_url }}" class="btn">ホームへ戻る</a>
    </div>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    (function () {
      const liffId = "{{ liff_id }}";
      const bootstrapUrl = "{{ bootstrap_url }}";
      const homeUrl = "{{ home_url }}";
      const statusEl = document.getElementById("status");
      const retryButton = document.getElementById("retry-button");

      function setStatus(message, type) {
        statusEl.textContent = message;
        statusEl.className = "status";
        if (type) {
          statusEl.classList.add(type);
        }
      }

      async function start() {
        try {
          setStatus("LINE認証を確認しています。", "");

          await liff.init({ liffId: liffId });

          if (!liff.isLoggedIn()) {
            setStatus("LINEログインへ移動します。", "");
            liff.login();
            return;
          }

          const profile = await liff.getProfile();
          const idToken = liff.getIDToken();

          const response = await fetch(bootstrapUrl, {
            method: "POST",
            credentials: "same-origin",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              lineUserId: profile.userId || "",
              displayName: profile.displayName || "",
              pictureUrl: profile.pictureUrl || "",
              idToken: idToken || ""
            })
          });

          const data = await response.json();

          if (!response.ok || !data.ok) {
            throw new Error(data.message || "ログイン処理に失敗しました。");
          }

          setStatus(data.message || "ログインしました。", "success");

          const redirectUrl = data.redirectUrl || homeUrl;
          window.location.href = redirectUrl;
        } catch (error) {
          console.error(error);
          setStatus(error.message || "LINEログイン処理でエラーが発生しました。", "error");
        }
      }

      retryButton.addEventListener("click", start);
      start();
    })();
  </script>
</body>
</html>
